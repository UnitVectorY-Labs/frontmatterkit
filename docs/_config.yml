title: frontmatterkit
description: "A Unix-style CLI for validating, querying, asserting, and minimally updating front matter in Markdown files."

remote_theme: just-the-docs/just-the-docs@v0.10.2
plugins:
  - jekyll-remote-theme

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# External navigation links
nav_external_links:
  - title: frontmatterkit on GitHub
    url: https://github.com/UnitVectorY-Labs/frontmatterkit

# Footer "Edit this page on GitHub" link text
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/UnitVectorY-Labs/frontmatterkit"
gh_edit_branch: "main"
gh_edit_source: "docs"
gh_edit_view_mode: "tree"
